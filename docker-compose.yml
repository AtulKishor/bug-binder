services:

  db:
    image: postgres:15
    container_name: bugbinder_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: bugbinder_web
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: bugbinder_tests
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - web

volumes:
  postgres_data:
